spring:
  main:
    allow-bean-definition-overriding: true

  r2dbc:
    url: r2dbc:h2:mem:///testdb;DB_CLOSE_DELAY=-1;MODE=PostgreSQL
    username: sa
    password:

  flyway:
    enabled: false

  autoconfigure:
    exclude:
      - org.springframework.boot.autoconfigure.data.redis.RedisAutoConfiguration
      - org.springframework.boot.autoconfigure.data.redis.RedisRepositoriesAutoConfiguration
      - org.springframework.boot.autoconfigure.data.redis.RedisReactiveAutoConfiguration
      - org.springframework.boot.autoconfigure.jdbc.DataSourceAutoConfiguration

agentos:
  security:
    jwt:
      enabled: false
      secret: test-only-insecure-key-not-for-production-use-must-be-32plus-chars
      public-paths:
        - /actuator/health
        - /actuator/info
      trust-gateway: false
  hitl:
    default-timeout-hours: 24
  context:
    cross-session-memory-limit: 0   # disable cross-session memory in tests

logging:
  level:
    root: WARN
    com.agentos.conversation: DEBUG
