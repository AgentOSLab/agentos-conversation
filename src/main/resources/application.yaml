server:
  port: 8011

spring:
  profiles:
    active: local
  application:
    name: agentos-conversation

  r2dbc:
    url: r2dbc:postgresql://${DB_HOST:localhost}:${DB_PORT:5432}/${DB_NAME:agentos_conversation}
    username: ${DB_USERNAME:agentos}
    password: ${DB_PASSWORD:agentos}

  flyway:
    enabled: true
    url: jdbc:postgresql://${DB_HOST:localhost}:${DB_PORT:5432}/${DB_NAME:agentos_conversation}
    user: ${DB_USERNAME:agentos}
    password: ${DB_PASSWORD:agentos}
    locations: classpath:db/migration

  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}

  jackson:
    default-property-inclusion: non_null
    deserialization:
      fail-on-unknown-properties: false

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics,prometheus
  endpoint:
    health:
      show-details: always
  metrics:
    tags:
      application: ${spring.application.name}

# PDP calls to user-system; fail-closed on errors unless local debugging
iam:
  fail-open: ${IAM_FAIL_OPEN:false}

logging:
  level:
    root: ${LOG_LEVEL:INFO}
    com.agentos.conversation: DEBUG

agentos:
  service-auth:
    identity: conversation
    shared-secret: ${SERVICE_AUTH_SECRET:changeme-dev-secret-32-chars-min!!}

  security:
    jwt:
      secret: ${JWT_SECRET:}
      public-key-pem: ${JWT_PUBLIC_KEY_PEM:}
      public-paths:
        - /actuator/health
        - /actuator/info
        - /actuator/metrics/**
        - /actuator/prometheus
      trust-gateway: true
  services:
    agent-runtime-url: ${AGENT_RUNTIME_URL:http://localhost:8004}
    hub-url: ${HUB_URL:http://localhost:8001}
    llm-gateway-url: ${LLM_GATEWAY_URL:http://localhost:8003}
    # NOTE: ADR-046 prohibits Conversation from injecting RAG results into context
    # during assembly. However, platform tools (search_knowledge) are LLM-driven
    # tool calls, not automatic context pre-population — this is allowed.
    rag:
      base-url: ${RAG_URL:http://localhost:8010}
    user-system-url: ${USER_SYSTEM_URL:http://localhost:8006}
  context:
    default-window-size: ${CONTEXT_WINDOW_SIZE:20}
    max-token-budget: ${CONTEXT_MAX_TOKENS:100000}
    pinned-messages-limit: ${CONTEXT_PINNED_LIMIT:10}
    summarization-trigger: ${CONTEXT_SUMMARIZATION_TRIGGER:30}
    tool-output-max-chars: ${CONTEXT_TOOL_OUTPUT_MAX_CHARS:2000}
  platform-tools:
    web-search:
      api-url: ${WEB_SEARCH_API_URL:}
      api-key: ${WEB_SEARCH_API_KEY:}
      provider: ${WEB_SEARCH_PROVIDER:brave}
    fetch-url:
      max-chars: ${FETCH_URL_MAX_CHARS:10000}
  sse:
    # SSE event buffer TTL in Redis. Must exceed the longest expected agent task
    # execution time to allow clients to replay missed events on reconnect.
    event-buffer-ttl-minutes: ${SSE_EVENT_BUFFER_TTL_MINUTES:60}
